<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random stuff</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="upper">
      <h1>Random Stuff</h1>
    </div>
    <div class="seperator">
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
      <div class="black sep_box"></div>
      <div class="white sep_box"></div>
    </div>
    <div class="lower">
      <button class="add">Add a thing</button>
      <button class="buy">Find a thing</button>
    </div>
    <hr />
    <div class="desc">
      <p class="dp">
        On this site, you'll stumble upon random stuff you never knew you
        needed—like a spork for spaghetti or a hat for your cat.
      </p>
    <p class="dp">
        Got a wacky idea? Add your own! Who knows? It might just change the world... or at least make someone chuckle.
    </p>
    </div>
    <div class="add-block">
        <div class="container">

            <div class="picture">
              <p class="upload-text">Image will appear here</p>
              <img id="uploaded-image" src="" alt="" style="display:none; width: 100%; height: 100%; object-fit: cover;">
            </div>

            <div class="details">
                <input type="text" class="_title" placeholder="Title">
                <textarea name="Description" id="_desription" placeholder="Description"></textarea>
                <textarea name="use" id="_use" placeholder="Funny use case of this product"></textarea>
                <textarea name="tags" id="_tags" placeholder="Tags (used in search)"></textarea>
                <input type="text" name="link" id="_link" placeholder="Link of the product">
                <input type="text" name="link" id="link" class="photo-link" placeholder="Link of the image">
            </div>
        </div>
        <button class="add-btn" >Add</button>
        <button class="_close">X</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
